<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #4ade80;
      letter-spacing: -0.5px;
    }

    .logo span { color: #f5f5f5; }

    .status-bar {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #999;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      transition: background 0.3s;
    }

    .dot.active { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

    .status-text { flex: 1; }

    .main { padding: 16px; }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-start {
      background: #4ade80;
      color: #0f0f0f;
    }

    .btn-start:hover { background: #22c55e; }

    .btn-stop {
      background: #222;
      color: #f87171;
      border: 1px solid #333;
    }

    .btn-stop:hover { background: #2a2a2a; }

    .info {
      margin-top: 12px;
      padding: 10px 12px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .info.hidden { display: none; }

    .last-saved {
      margin-top: 10px;
      font-size: 11px;
      color: #555;
      min-height: 16px;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1a1a1a;
      font-size: 11px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Delli<span>.</span>cate</div>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="statusText">Inactive</span>
  </div>

  <div class="main">
    <button class="btn btn-start" id="btn">Start Monitoring</button>

    <div class="info" id="info">
      🎙 Listening to stories...<br>
      Audio is transcribed and discarded immediately.<br>
      No media is stored.
    </div>

    <div class="last-saved" id="lastSaved"></div>
  </div>

  <div class="footer">Instagram Stories · Delli.cate v1.0</div>

  <script src="popup.js"></script>
</body>
</html>
