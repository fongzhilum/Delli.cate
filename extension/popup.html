<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Delli.cate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }

    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 700;
      color: white;
    }

    .header-text p {
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      margin-top: 1px;
    }

    .body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

    .status-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
    }

    .status-dot.active  { background: #22c55e; box-shadow: 0 0 0 3px #dcfce7; }
    .status-dot.waiting { background: #f59e0b; box-shadow: 0 0 0 3px #fef9c3; }

    .status-label { font-size: 12px; font-weight: 600; color: #475569; }
    .status-sub   { font-size: 10px; color: #94a3b8; margin-top: 1px; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }

    .stat-num  { font-size: 22px; font-weight: 700; color: #4f46e5; }
    .stat-label { font-size: 10px; color: #94a3b8; margin-top: 2px; }

    .last-scan {
      font-size: 10px;
      color: #94a3b8;
      text-align: center;
    }

    .footer {
      border-top: 1px solid #e2e8f0;
      padding: 10px 14px;
      font-size: 10px;
      color: #cbd5e1;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🛡️</div>
    <div class="header-text">
      <h1>Delli.cate</h1>
      <p>Story Scanner Active</p>
    </div>
  </div>

  <div class="body">

    <div class="status-card">
      <div class="status-dot" id="statusDot"></div>
      <div>
        <div class="status-label" id="statusLabel">Waiting for Instagram Stories</div>
        <div class="status-sub"  id="statusSub">Navigate to any story to begin</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-num"  id="storiesCount">0</div>
        <div class="stat-label">Stories Scanned</div>
      </div>
      <div class="stat-card">
        <div class="stat-num"  id="flaggedCount" style="color:#dc2626">0</div>
        <div class="stat-label">Flagged</div>
      </div>
    </div>

    <div class="last-scan" id="lastScan">No scans yet this session</div>

  </div>

  <div class="footer">Delli.cate · AI Risk Assessment</div>

  <script src="popup.js"></script>
</body>
</html>
